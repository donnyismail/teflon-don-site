<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found | Teflon Don LLC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='12' fill='%23FF4D00'/><text x='50' y='72' font-family='Arial,sans-serif' font-size='60' font-weight='bold' fill='white' text-anchor='middle'>TD</text></svg>">
  <meta name="theme-color" content="#FF4D00">
  <style>
    :root {
      --black: #08080C;
      --off-black: #0E0E14;
      --dark: #16161E;
      --cream: #D8D5CF;
      --white: #F0EDE8;
      --accent: #FF4D00;
      --accent2: #FF7A33;
      --muted: #4A4A55;
      --heading: 'Space Grotesk', sans-serif;
      --body: 'Inter', sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--body);
      background: var(--black);
      color: var(--cream);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .container { max-width: 540px; }
    .code {
      font-family: var(--heading);
      font-size: clamp(5rem, 15vw, 10rem);
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
      letter-spacing: -4px;
      margin-bottom: 1rem;
    }
    .tag {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-family: var(--heading);
      font-size: clamp(1.5rem, 4vw, 2rem);
      font-weight: 600;
      color: var(--white);
      margin-bottom: 1rem;
      line-height: 1.3;
    }
    p {
      font-size: 0.95rem;
      color: var(--cream);
      line-height: 1.7;
      margin-bottom: 2rem;
      opacity: 0.8;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0.9rem 2rem;
      font-family: var(--body);
      font-size: 0.8rem;
      font-weight: 600;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: box-shadow 0.3s, transform 0.3s;
      background: var(--accent);
      color: #fff;
    }
    .btn:hover {
      box-shadow: 0 4px 30px rgba(255, 77, 0, 0.3);
      transform: translateY(-2px);
    }
    .countdown {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 1.5rem;
    }
    .countdown span { color: var(--accent); }
  </style>
</head>
<body>
  <div class="container">
    <div class="code">404</div>
    <div class="tag">Page not found</div>
    <h1>Nothing sticks here either.</h1>
    <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
    <a href="/" class="btn">Back to Home</a>
    <div class="countdown">Redirecting in <span id="timer">8</span> seconds</div>
  </div>
  <script>
    var seconds = 8;
    var timer = document.getElementById('timer');
    var interval = setInterval(function() {
      seconds--;
      timer.textContent = seconds;
      if (seconds <= 0) {
        clearInterval(interval);
        window.location.href = '/';
      }
    }, 1000);
  </script>
</body>
</html>
